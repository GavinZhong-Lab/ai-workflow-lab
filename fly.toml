app = "saas-platform-api-kind-fire-7734"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4000"
  NODE_ENV = "production"
  APP_URL = "https://ai-workflow-lab-web.vercel.app"
  API_URL = "https://saas-platform-api-kind-fire-7734.fly.dev"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/api/health"
    method = "GET"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
